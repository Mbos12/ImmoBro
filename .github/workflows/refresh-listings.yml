name: Refresh listings

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC. Running at 06/07 and 18/19 UTC lets the
    # script enforce 08:00 and 20:00 Europe/Brussels across DST changes.
    - cron: "0 6,7,18,19 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check whether this is a Belgium refresh hour
        id: brussels-time
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual run; refreshing now."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ=Europe/Brussels date +%H)
          echo "hour=$HOUR" >> "$GITHUB_OUTPUT"
          if [ "$HOUR" != "08" ] && [ "$HOUR" != "20" ]; then
            echo "Not 08:00 or 20:00 in Belgium; skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.brussels-time.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.brussels-time.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.brussels-time.outputs.run == 'true'
        run: npm ci

      - name: Install browser
        if: steps.brussels-time.outputs.run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Refresh listings
        if: steps.brussels-time.outputs.run == 'true'
        run: npm run refresh

      - name: Commit refreshed data
        if: steps.brussels-time.outputs.run == 'true'
        run: |
          if git diff --quiet -- data/listings.json data/refresh-log.json; then
            echo "No listing changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/listings.json data/refresh-log.json
          git commit -m "Refresh apartment listings"
          git push
